<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookings - AutoHub Portal</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">AutoHub Portal</div>
            <ul class="nav-links" id="navLinks">
                <li><a href="../index.html">Home</a></li>
                <li><a href="vehicles.html">Vehicles</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="bookings.html" class="active">Bookings</a></li>
                <li><a href="admin.html" id="adminLink" style="display:none;">Admin</a></li>
                <li><a href="#" id="logoutLink">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1>Service Bookings</h1>

        <div class="button-group">
            <button class="btn btn-primary" onclick="showBookingForm()">New Booking</button>
        </div>

        <div id="bookingForm" class="form-card" style="display:none;">
            <h2>Schedule a Service</h2>
            <form id="newBookingForm">
                <div class="form-group">
                    <label for="vehicle_id">Select Vehicle *</label>
                    <select id="vehicle_id" required>
                        <option value="">Loading vehicles...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="service_id">Select Service *</label>
                    <select id="service_id" required>
                        <option value="">Loading services...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="booking_date">Preferred Date & Time *</label>
                    <input type="datetime-local" id="booking_date" required>
                </div>
                <div class="form-group">
                    <label for="notes">Additional Notes</label>
                    <textarea id="notes" rows="4"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Schedule Booking</button>
                <button type="button" class="btn btn-secondary" onclick="hideBookingForm()">Cancel</button>
            </form>
            <div id="bookingMessage" class="message"></div>
        </div>

        <div class="table-container">
            <h2>Your Bookings</h2>
            <table id="bookingsTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Vehicle</th>
                        <th>Service</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="bookingsBody">
                    <tr><td colspan="5" class="loading">Loading bookings...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/bookings.js"></script>
</body>
</html>
